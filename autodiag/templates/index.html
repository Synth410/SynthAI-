<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>SynthAI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060a12; color: #e6edf3; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#header { background: linear-gradient(135deg, #0d1520 0%, #0a1628 100%); padding: 12px 24px; border-bottom: 1px solid #1d2d44; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.5); }
#logo { width: 36px; height: 36px; background: linear-gradient(135deg, #1f6feb, #58a6ff); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
#title { font-size: 18px; font-weight: 600; color: #e6edf3; letter-spacing: 0.5px; }
#title span { color: #58a6ff; }
#badges { margin-left: auto; display: flex; gap: 10px; align-items: center; }
#clock { font-size: 13px; color: #8b949e; font-weight: 500; }
#adapter-badge { font-size: 12px; color: #58a6ff; background: linear-gradient(135deg, #0d1a35, #1a2a5a); border: 1px solid #1f6feb; border-radius: 20px; padding: 4px 12px; display: none; }
#mode { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; transition: all 0.3s; }
.online { background: linear-gradient(135deg, #0d2818, #0f3520); color: #3fb950; border: 1px solid #238636; }
.offline { background: linear-gradient(135deg, #2d1010, #3d1515); color: #f85149; border: 1px solid #8b2020; }
#main { flex: 1; display: flex; overflow: hidden; }
#sidebar { width: 240px; background: linear-gradient(180deg, #0a0f1a 0%, #080c14 100%); border-right: 1px solid #1d2d44; display: flex; flex-direction: column; }
#sidebar-header { padding: 14px 16px; border-bottom: 1px solid #1d2d44; display: flex; align-items: center; justify-content: space-between; }
#sidebar-header span { font-size: 12px; font-weight: 600; color: #6e7681; text-transform: uppercase; letter-spacing: 0.8px; }
#sidebar-actions { display: flex; gap: 4px; }

#new-chat-btn {
  background: linear-gradient(135deg, #1f6feb, #388bfd);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
}
#new-chat-btn:hover { opacity: 0.85; }

#cars-btn {
  background: linear-gradient(135deg, #1d2d44, #243447);
  color: #8b949e;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 4px 7px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
#cars-btn:hover { background: linear-gradient(135deg, #238636, #2ea043); color: white; border-color: #238636; }

#adapter-page-btn {
  background: linear-gradient(135deg, #1d2d44, #243447);
  color: #8b949e;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 4px 7px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
#adapter-page-btn:hover { background: linear-gradient(135deg, #1f6feb, #388bfd); color: white; }
#sessions-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: #1d2d44 transparent; }
.session-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: all 0.2s; border: 1px solid transparent; position: relative; }
.session-item:hover { background: #111827; border-color: #1d2d44; }
.session-item.active { background: linear-gradient(135deg, #111827, #0d1520); border-color: #1f6feb; }
.session-item:hover .del-btn { opacity: 1; }
.session-date { font-size: 11px; color: #6e7681; margin-bottom: 3px; }
.session-preview { font-size: 13px; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }
.del-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); opacity: 0; background: linear-gradient(135deg, #0d1a3a, #1a2a5a); border: 1px solid #1f6feb; color: #58a6ff; border-radius: 6px; width: 22px; height: 22px; font-size: 11px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.del-btn:hover { background: linear-gradient(135deg, #8b2020, #a32d2d); color: white; border-color: #f85149; }
#chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#messages { flex: 1; overflow-y: auto; padding: 24px 15%; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: #1d2d44 transparent; }
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: #1d2d44; }
.msg-wrap { display: flex; flex-direction: column; gap: 4px; }
.msg-wrap.u { align-items: flex-end; }
.msg-wrap.a { align-items: flex-start; }
.lbl { font-size: 11px; color: #6e7681; padding: 0 4px; }
.msg { max-width: 78%; padding: 13px 17px; border-radius: 16px; line-height: 1.65; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.msg.u { background: linear-gradient(135deg, #1f6feb, #2979d4); color: white; border-radius: 16px 16px 3px 16px; box-shadow: 0 2px 15px rgba(31,111,235,0.25); }
.msg.a { background: linear-gradient(135deg, #111827, #0d1520); border: 1px solid #1d2d44; color: #e6edf3; border-radius: 16px 16px 16px 3px; box-shadow: 0 2px 15px rgba(0,0,0,0.3); }
.msg.system { background: linear-gradient(135deg, #0d1a35, #1a2a5a); border: 1px solid #1f6feb; color: #58a6ff; border-radius: 10px; font-size: 13px; max-width: 90%; align-self: center; }
.cursor { display: inline-block; width: 2px; height: 14px; background: #58a6ff; margin-left: 2px; vertical-align: middle; animation: blink-cursor 0.7s infinite; }
@keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
.dots { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
.dots span { width: 6px; height: 6px; background: linear-gradient(135deg, #1f6feb, #58a6ff); border-radius: 50%; animation: blink 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
#input-area { background: linear-gradient(135deg, #0d1520, #0a0f1a); border-top: 1px solid #1d2d44; padding: 14px 15%; display: flex; gap: 10px; align-items: center; }
#input { flex: 1; background: linear-gradient(135deg, #111827, #0d1520); border: 1px solid #1d2d44; border-radius: 12px; padding: 12px 16px; color: #e6edf3; font-size: 14px; outline: none; transition: border 0.2s, box-shadow 0.2s; }
#input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }
#input::placeholder { color: #6e7681; }
.btn { border: none; border-radius: 12px; padding: 12px 18px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
#scan-btn { background: linear-gradient(135deg, #0d2818, #1a4d2e); color: #3fb950; border: 1px solid #238636; }
#scan-btn:hover { background: linear-gradient(135deg, #238636, #2ea043); color: white; }
#send-btn { background: linear-gradient(135deg, #1f6feb, #388bfd); color: white; }
#send-btn:hover { background: linear-gradient(135deg, #388bfd, #58a6ff); }
#stop-btn { background: linear-gradient(135deg, #2d1010, #3d1515); color: #f85149; border: 1px solid #8b2020; display: none; }
#stop-btn:hover { background: linear-gradient(135deg, #8b2020, #a32d2d); color: white; }
#voice-btn { position: fixed; bottom: 90px; right: 24px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #1d2d44, #243447); border: 1px solid #30363d; color: #58a6ff; font-size: 18px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
#voice-btn:hover { background: linear-gradient(135deg, #1f6feb, #388bfd); color: white; transform: scale(1.1); }
#voice-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #060a12; z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 28px; }
#voice-overlay.open { display: flex; }
#voice-cloud { width: 220px; height: 220px; position: relative; }
#voice-canvas { position: absolute; top: 0; left: 0; }
#voice-status { font-size: 16px; color: #58a6ff; font-weight: 500; letter-spacing: 0.5px; }
#voice-transcript { font-size: 14px; color: #8b949e; text-align: center; max-width: 500px; min-height: 44px; line-height: 1.6; }
#voice-history-btn { background: linear-gradient(135deg, #1d2d44, #243447); color: #8b949e; border: 1px solid #30363d; border-radius: 10px; padding: 8px 20px; cursor: pointer; font-size: 13px; }
#voice-history-btn:hover { color: #c9d1d9; border-color: #58a6ff; }
#voice-close { background: linear-gradient(135deg, #2d1010, #3d1515); color: #f85149; border: 1px solid #8b2020; border-radius: 12px; padding: 11px 32px; cursor: pointer; font-size: 14px; font-weight: 500; }
#voice-close:hover { background: linear-gradient(135deg, #8b2020, #a32d2d); color: white; }
#voice-log-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #060a12; z-index: 300; display: none; flex-direction: column; }
#voice-log-overlay.open { display: flex; }
#voice-log-header { background: linear-gradient(135deg, #0d1520, #0a1628); padding: 14px 24px; border-bottom: 1px solid #1d2d44; display: flex; align-items: center; justify-content: space-between; }
#voice-log-header span { font-size: 16px; font-weight: 600; color: #e6edf3; }
#voice-log-close { background: none; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
#voice-log-messages { flex: 1; overflow-y: auto; padding: 24px 20%; display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">◈</div>
  <div id="title">Synth<span>AI</span></div>
  <div id="badges">
    <span id="clock">--:--</span>
    <span id="adapter-badge">🔌 <span id="adapter-name"></span></span>
    <span id="mode" class="online">● Онлайн</span>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Історія</span>
      <div id="sidebar-actions">
        <button id="new-chat-btn" onclick="newChat()">+ Новий</button>
        <button id="cars-btn" onclick="window.location.replace('/cars')" title="База авто">🚗</button>
        <button id="adapter-page-btn" onclick="window.location.replace('/adapters-page')" title="Адаптери">🔌</button>
      </div>
    </div>
    <div id="sessions-list"></div>
  </div>

  <div id="chat-area">
    <div id="messages">
      <div class="msg-wrap a">
        <div class="lbl">IRIS</div>
        <div class="msg a">Система SynthAI готова. Підключіть OBD адаптер для діагностики або опишіть проблему.</div>
      </div>
    </div>
    <div id="input-area">
      <button class="btn" id="scan-btn" onclick="scan()">Сканувати</button>
      <input id="input" type="text" placeholder="Введіть повідомлення..." onkeydown="if(event.key==='Enter') send()">
      <button class="btn" id="stop-btn" onclick="stopChat()">Стоп</button>
      <button class="btn" id="send-btn" onclick="send()">Надіслати</button>
    </div>
  </div>
</div>

<button id="voice-btn" onclick="openVoice()" title="Голосовий режим">&#x1F3A4;</button>

<div id="voice-overlay">
  <div id="voice-cloud"><canvas id="voice-canvas" width="220" height="220"></canvas></div>
  <div id="voice-status">Слухаю...</div>
  <div id="voice-transcript"></div>
  <button id="voice-history-btn" onclick="openVoiceLog()">Переглянути розмову</button>
  <button id="voice-close" onclick="closeVoice()">Закрити</button>
</div>

<div id="voice-log-overlay">
  <div id="voice-log-header">
    <span>Голосова розмова</span>
    <button id="voice-log-close" onclick="closeVoiceLog()">Назад</button>
  </div>
  <div id="voice-log-messages"></div>
</div>

<script>
(function() {
  const API_TOKEN = "{{ api_token }}";
  const _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers, { "X-API-Token": API_TOKEN });
    return _origFetch(url, opts);
  };
})();

document.addEventListener("keydown", function(e) {
  const blocked = ["F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12","Escape","Meta","ContextMenu"];
  if (blocked.includes(e.key)) { e.preventDefault(); e.stopPropagation(); return false; }
});

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const days = ["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];
  const months = ["січ","лют","бер","квіт","трав","черв","лип","серп","вер","жовт","лист","груд"];
  document.getElementById("clock").innerText = days[now.getDay()]+" "+now.getDate()+" "+months[now.getMonth()]+" "+h+":"+m;
}
updateClock();
setInterval(updateClock, 10000);

function updateMode(mode) {
  const el = document.getElementById("mode");
  if (mode === "online") { el.className = "online"; el.innerText = "● Онлайн"; }
  else { el.className = "offline"; el.innerText = "● Автономний"; }
}

async function loadActiveAdapter() {
  try {
    const res = await fetch("/api/active-adapter");
    const a = await res.json();
    if (a && a.name) {
      document.getElementById("adapter-name").innerText = a.name;
      document.getElementById("adapter-badge").style.display = "block";
    }
  } catch(e) {}
}

let _lastAdapterStatus = null;

function startAdapterStatusListener() {
  const evtSource = new EventSource("/adapter/status");
  evtSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      const key = data.status + "_" + data.adapter;
      if (key === _lastAdapterStatus) return;
      _lastAdapterStatus = key;

      if (data.status === "ready" && data.summary) {
        const car = data.car;
        const carStr = car ? `${car.year || ''} ${car.make || ''} ${car.model || ''}`.trim() : "";
        const sensors = (data.sensors || []).slice(0,4).join(", ");
        const actuators = (data.actuators || []).length ? (data.actuators || []).join(", ") : "недоступні";
        const text = `🔌 Адаптер "${data.adapter}" проаналізовано${carStr ? " для " + carStr : ""}.\n${data.summary}\nДатчики: ${sensors || "стандартні OBD"}\nАктуатори: ${actuators}`;
        addSystemMsg(text);
        document.getElementById("adapter-name").innerText = data.adapter;
        document.getElementById("adapter-badge").style.display = "block";
      }
    } catch(e) {}
  };
}

function addSystemMsg(text) {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap a";
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerText = "IRIS";
  const msg = document.createElement("div");
  msg.className = "msg system";
  msg.innerText = text;
  wrap.appendChild(lbl);
  wrap.appendChild(msg);
  document.getElementById("messages").appendChild(wrap);
  wrap.scrollIntoView({behavior:"smooth"});
}

function addMsg(text, type) {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap " + (type === "u" ? "u" : "a");
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerText = type === "u" ? "Оператор" : "IRIS";
  const msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;
  wrap.appendChild(lbl);
  wrap.appendChild(msg);
  document.getElementById("messages").appendChild(wrap);
  wrap.scrollIntoView({behavior:"smooth"});
  return msg;
}

function addThinking() {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap a";
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerText = "IRIS";
  const msg = document.createElement("div");
  msg.className = "msg a";
  msg.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(lbl);
  wrap.appendChild(msg);
  document.getElementById("messages").appendChild(wrap);
  wrap.scrollIntoView({behavior:"smooth"});
  return wrap;
}

let currentReader = null;

async function streamChat(userText) {
  const thinking = addThinking();
  let aiMsg = null;
  document.getElementById("stop-btn").style.display = "block";
  document.getElementById("send-btn").style.display = "none";
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: userText})
    });
    const reader = res.body.getReader();
    currentReader = reader;
    const decoder = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split("\n");
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.done) {
            updateMode(data.mode);
            if (aiMsg) { const c = aiMsg.querySelector(".cursor"); if (c) c.remove(); }
            loadSessions();
            break;
          }
          if (data.token !== undefined && data.token !== "") {
            if (!aiMsg) {
              thinking.remove();
              const wrap = document.createElement("div");
              wrap.className = "msg-wrap a";
              const lbl = document.createElement("div");
              lbl.className = "lbl";
              lbl.innerText = "IRIS";
              aiMsg = document.createElement("div");
              aiMsg.className = "msg a";
              aiMsg.innerHTML = '<span class="cursor"></span>';
              wrap.appendChild(lbl);
              wrap.appendChild(aiMsg);
              document.getElementById("messages").appendChild(wrap);
            }
            const cursor = aiMsg.querySelector(".cursor");
            aiMsg.insertBefore(document.createTextNode(data.token), cursor);
            aiMsg.scrollIntoView({behavior:"smooth", block:"end"});
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    thinking.remove();
    addMsg("Помилка з'єднання", "a");
  } finally {
    currentReader = null;
    document.getElementById("stop-btn").style.display = "none";
    document.getElementById("send-btn").style.display = "block";
    if (aiMsg) { const c = aiMsg.querySelector(".cursor"); if (c) c.remove(); }
  }
}

function stopChat() {
  if (currentReader) { currentReader.cancel(); currentReader = null; }
  document.getElementById("stop-btn").style.display = "none";
  document.getElementById("send-btn").style.display = "block";
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addMsg(text, "u");
  await streamChat(text);
}

async function scan() {
  addMsg("Запускаю сканування...", "u");
  await streamChat("Проведи діагностику авто і розкажи про помилки та стан систем.");
}

async function loadSessions() {
  try {
    const res = await fetch("/sessions");
    const sessions = await res.json();
    const list = document.getElementById("sessions-list");
    list.innerHTML = "";
    sessions.forEach(s => {
      const item = document.createElement("div");
      item.className = "session-item";
      item.innerHTML = '<div class="session-date">'+s.date+'</div><div class="session-preview">'+s.preview+'</div><button class="del-btn">✕</button>';
      item.querySelector(".del-btn").onclick = async (e) => {
        e.stopPropagation();
        await fetch("/session/"+s.id+"/delete", {method:"DELETE"});
        item.remove();
      };
      item.onclick = () => openSession(s.id);
      list.appendChild(item);
    });
  } catch(e) {}
}

async function openSession(id) {
  const res = await fetch("/session/"+id);
  const data = await res.json();
  const messages = document.getElementById("messages");
  messages.innerHTML = "";
  data.messages.forEach(m => addMsg(m.content, m.role === "user" ? "u" : "a"));
}

async function newChat() {
  await fetch("/new_session", {method:"POST"});
  document.getElementById("messages").innerHTML = "";
  addMsg("Система SynthAI готова. Підключіть OBD адаптер для діагностики або опишіть проблему.", "a");
  document.querySelectorAll(".session-item").forEach(el => el.classList.remove("active"));
}

async function loadLastSession() {
  try {
    const res = await fetch("/sessions");
    const sessions = await res.json();
    if (sessions.length > 0) {
      const last = sessions[0];
      const sRes = await fetch("/session/"+last.id);
      const data = await sRes.json();
      const messages = document.getElementById("messages");
      messages.innerHTML = "";
      data.messages.forEach(m => addMsg(m.content, m.role === "user" ? "u" : "a"));
    }
  } catch(e) {}
}

const voiceCanvas = document.getElementById("voice-canvas");
const vctx = voiceCanvas.getContext("2d");
let voiceAnimFrame = null;
let voiceState = "idle";
let voiceLog = [];

function drawCloud(phase, state) {
  vctx.clearRect(0, 0, 220, 220);
  const cx = 110, cy = 110;
  const numPoints = 80;
  vctx.beginPath();
  for (let i = 0; i <= numPoints; i++) {
    const angle = (i / numPoints) * Math.PI * 2;
    let r = 75;
    if (state === "listening") { r += Math.sin(angle*5+phase)*20; r += Math.sin(angle*9+phase*1.3)*10; }
    else if (state === "speaking") { r += Math.sin(angle*4+phase*1.5)*25; r += Math.sin(angle*6+phase*2)*12; }
    else if (state === "thinking") { r += Math.sin(angle*3+phase*0.6)*10; }
    else { r += Math.sin(angle*2+phase*0.3)*5; }
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? vctx.moveTo(x,y) : vctx.lineTo(x,y);
  }
  vctx.closePath();
  const grad = vctx.createRadialGradient(cx,cy,15,cx,cy,100);
  if (state==="listening") { grad.addColorStop(0,"rgba(88,166,255,0.95)"); grad.addColorStop(0.5,"rgba(31,111,235,0.6)"); grad.addColorStop(1,"rgba(13,21,32,0.2)"); }
  else if (state==="speaking") { grad.addColorStop(0,"rgba(63,185,80,0.95)"); grad.addColorStop(0.5,"rgba(35,134,54,0.6)"); grad.addColorStop(1,"rgba(13,21,32,0.2)"); }
  else if (state==="thinking") { grad.addColorStop(0,"rgba(210,153,34,0.95)"); grad.addColorStop(0.5,"rgba(158,108,12,0.6)"); grad.addColorStop(1,"rgba(13,21,32,0.2)"); }
  else { grad.addColorStop(0,"rgba(48,54,61,0.8)"); grad.addColorStop(1,"rgba(13,21,32,0.1)"); }
  vctx.fillStyle = grad;
  vctx.fill();
}

let phase = 0;
function animateCloud() {
  phase += voiceState==="speaking"?0.08:voiceState==="listening"?0.06:0.02;
  drawCloud(phase, voiceState);
  voiceAnimFrame = requestAnimationFrame(animateCloud);
}

function openVoice() {
  document.getElementById("voice-overlay").classList.add("open");
  animateCloud();
  startVoiceLoop();
}

function closeVoice() {
  document.getElementById("voice-overlay").classList.remove("open");
  if (voiceAnimFrame) cancelAnimationFrame(voiceAnimFrame);
  voiceState = "idle";
}

function openVoiceLog() {
  const log = document.getElementById("voice-log-messages");
  log.innerHTML = "";
  voiceLog.forEach(m => {
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + (m.role==="user"?"u":"a");
    const lbl = document.createElement("div");
    lbl.className = "lbl";
    lbl.innerText = m.role==="user"?"Оператор":"IRIS";
    const msg = document.createElement("div");
    msg.className = "msg " + (m.role==="user"?"u":"a");
    msg.innerText = m.text;
    wrap.appendChild(lbl);
    wrap.appendChild(msg);
    log.appendChild(wrap);
  });
  document.getElementById("voice-log-overlay").classList.add("open");
}

function closeVoiceLog() {
  document.getElementById("voice-log-overlay").classList.remove("open");
}

async function startVoiceLoop() {
  if (!document.getElementById("voice-overlay").classList.contains("open")) return;
  voiceState = "listening";
  document.getElementById("voice-status").innerText = "Слухаю...";
  document.getElementById("voice-transcript").innerText = "";
  try {
    const res = await fetch("/voice/listen", {method:"POST"});
    const data = await res.json();
    if (!document.getElementById("voice-overlay").classList.contains("open")) return;
    if (data.ok && data.text) {
      document.getElementById("voice-transcript").innerText = data.text;
      voiceLog.push({role:"user", text:data.text});
      voiceState = "thinking";
      document.getElementById("voice-status").innerText = "Аналізую...";
      const chatRes = await fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:data.text})
      });
      const reader = chatRes.body.getReader();
      const decoder = new TextDecoder();
      let fullReply = "";
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split("\n");
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const d = JSON.parse(line.slice(6));
            if (d.done) break;
            if (d.token) fullReply += d.token;
          } catch(e) {}
        }
      }
      voiceLog.push({role:"ai", text:fullReply});
      voiceState = "speaking";
      document.getElementById("voice-status").innerText = "Відповідаю...";
      document.getElementById("voice-transcript").innerText = fullReply.slice(0,120)+(fullReply.length>120?"...":"");
      await fetch("/voice/speak", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:fullReply})
      });
    }
  } catch(e) { console.log("Voice error:", e); }
  setTimeout(()=>startVoiceLoop(), 300);
}

setInterval(async () => {
  try {
    const res = await fetch("/status");
    const data = await res.json();
    updateMode(data.online ? "online" : "offline");
  } catch(e) {}
}, 10000);

loadSessions();
loadLastSession();
loadActiveAdapter();
startAdapterStatusListener();
</script>
